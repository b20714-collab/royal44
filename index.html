<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Mortem - 이화여고 특별판</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --neon-blue: #46a29f;
            --neon-cyan: #66fcf1;
            --text-color: #c5c6c7;
            --pure-white: #ffffff;
            --penalty-red: #ff4d4d;
            --money-gold: #ffd700;
            --success-green: #2ecc71;
            --main-font: 'Malgun Gothic', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--main-font); }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* 공통 씬 제어 */
        .scene { display: none; width: 100%; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; box-sizing: border-box; position: relative; z-index: 1; }
        .scene.active { display: flex !important; animation: fadeIn 0.5s ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 공통 버튼 */
        button { background-color: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan); padding: 12px 30px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: all 0.3s ease; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; position: relative; z-index: 10; }
        button:hover { background-color: var(--neon-cyan); color: var(--bg-color); box-shadow: 0 0 15px var(--neon-cyan); }
